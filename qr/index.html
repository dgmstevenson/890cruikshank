<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>890 Cruikshank Ridge — Mount Washington</title>
  <meta name="description" content="890 Cruikshank Ridge — a custom chalet for sale by owner at Mount Washington, BC." />
  <!-- Redirect to the main listing. The QR code points here so we can track/adjust later. -->
  <meta http-equiv="refresh" content="0; url=/" />
  <link rel="canonical" href="https://890cruikshank.ca/" />
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      display: grid; place-items: center;
      font-family: "Fraunces", Georgia, serif;
      background: #142519; color: #f8f6f1; text-align: center; padding: 24px;
    }
    .card { max-width: 420px; }
    h1 { font-size: 1.6rem; margin: 0 0 8px; }
    p { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: rgba(255,255,255,0.75); margin: 0 0 20px; }
    a {
      display: inline-block; background: #b07a43; color: #fff; text-decoration: none;
      padding: 12px 26px; border-radius: 999px; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; font-weight: 600;
    }
    .dot { display:inline-block; width:8px; height:8px; margin:0 3px; border-radius:50%; background:#b07a43; animation: pulse 1.2s infinite ease-in-out; }
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse { 0%,100%{opacity:.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }
  </style>
</head>
<body>
  <div class="card">
    <h1>890 Cruikshank Ridge</h1>
    <p>Taking you to the listing<br /><span class="dot"></span><span class="dot"></span><span class="dot"></span></p>
    <a href="/">View the Chalet</a>
  </div>
  <script>window.location.replace("/");</script>
</body>
</html>
